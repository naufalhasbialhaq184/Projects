<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found (OOP Version)</title>
    <style>
        /* CSS TIDAK BERUBAH DARI VERSI ANDA */
        *{ font-family:'Courier New', Courier, monospace }
        .container{
            display: grid;
            grid-template-columns: 500px;
            grid-template-rows: auto 600px auto 600px auto;
            grid-template-areas: "header" "list_nemu" "isi_nemu" "list_hilang" "isi_hilang";
            row-gap: 20px;
            margin: 40px;
            justify-content: center;
        }
        .header{
            background-color: rgb(177, 233, 255);
            border-radius: 100px;
            grid-area: header;
            font-size: 30px;
            text-align: center;
            font-weight: bold;
        }
        .list_nemu{ background-color: rgb(16, 238, 164); overflow: scroll; grid-area: list_nemu; }
        .list_hilang{ background-color: rgb(16, 238, 164); overflow: scroll; grid-area: list_hilang; }
        
        .barang{ margin: 5px; border: solid; background-color: aliceblue; cursor: pointer; position: relative; }
        .barang:hover{ background-color: aqua; transition: background-color 0.5s; }
        
        /* CSS Popup */
        .barang::after{
            /* Content diatur via JS atau CSS spesifik di bawah */
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background-color: #333; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; white-space: nowrap;
            opacity: 0; visibility: hidden; transition: opacity 0.3s; pointer-events: none;
        }
        .barang:hover::after{ opacity: 1; visibility: visible; bottom: 110%; }
        
        /* Spesifik Text Popup via CSS agar rapi */
        .list_nemu .barang::after { content: "Klik Untuk Ambil Barang"; }
        .list_hilang .barang::after { content: "Klik Jika Kamu Menemukan Barang ini"; }

        .list_nemu > p, .list_hilang > p{ text-align: center; background-color: rgb(16, 238, 164); font-weight: 600; font-size:20px; }
        
        .isi_nemu{ background-color: rgb(16, 238, 164); grid-area: isi_nemu; }
        .isi_hilang{ background-color: rgb(16, 238, 164); grid-area: isi_hilang; }
        
        .isi_nemu > p, .isi_hilang > p{ text-align: center; font-weight: 600; font-size: 20px }
        .form{ background-color: aliceblue; }
        label, input{ margin: 10px; }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="header">Welcome To Lost and Found</div>
        
        <div class="list_nemu" id="list_nemu">
            </div>
        <div class="isi_nemu">
            <p>Tempat Melaporkan Penemuan Barang</p>
            <form action="" method="get" name="nemu_barang" class="form">
                <label>Nama barang</label> <input type="text" name="nama_barang"><br>
                <label>Deskripsi Barang</label> <input type="text" name="deskripsi_barang"><br>
                <label>Waktu Menemukan</label> <input type="datetime-local" name="waktu_menemukan"><br>
                <label>Tempat Menemukan</label> <input type="text" name="tempat_menemukan"><br>
                <label>Contact Person Penemu</label> <input type="text" name="contact_person_penemu"><br>
                <input type="submit" value="Submit">
            </form>
        </div>

        <div class="list_hilang" id="list_hilang">
             </div>
        <div class="isi_hilang">
            <p>Tempat Melaporkan Kehilangan Barang</p>
            <form action="" method="get" name="hilang_barang" class="form">
                <label>Nama barang</label> <input type="text" name="nama_barang"><br>
                <label>Deskripsi Barang</label> <input type="text" name="deskripsi_barang"><br>
                <label>Waktu Kehilangan</label> <input type="datetime-local" name="waktu_kehilangan"><br>
                <label>Tempat Kehilangan</label> <input type="text" name="tempat_kehilangan"><br>
                <label>Contact Person Kehilangan</label> <input type="text" name="contact_person_kehilangan"><br>
                <input type="submit" value="Submit">
            </form>
        </div>
    </div>

    <script>
    class Barang{
    constructor(nama, deskripsi, waktu, tempat, contact_person){
        this.nama = nama
        this.deskripsi = deskripsi
        this.waktu = waktu
        this.tempat = tempat
        this.contact_person = contact_person
    }
}

class Manajemen_List{
    constructor(tipe, container_id, judul_list, form_name){
        this.tipe = tipe
        this.items = []
        this.container = document.getElementById(container_id)
        this.judul_list = judul_list
        this.form = document.forms[form_name]
        this.submit_form()
    }

    submit_form(){
        this.form.onsubmit = (event) =>{
            event.preventDefault()

            const kata_kunci = (this.tipe === "nemu") ? "menemukan" : "kehilangan"
            const kata_kunci_contact = (this.tipe === "nemu") ? "penemu" : "kehilangan"
            
            const barang_baru  = new Barang(
                this.nama = this.form["nama_barang"].value,
                this.deskripsi = this.form["deskripsi_barang"].value,
                this.waktu = this.form[`waktu_${kata_kunci}`].value,
                this.tempat = this.form[`tempat_${kata_kunci}`].value,
                this.contact_person = this.form[`contact_person_${kata_kunci_contact}`].value
            )

            this.items.push(barang_baru)
            this.form.reset()
            alert("Data akan ditambahkan")

            this.update_list()
        };    
    }
    dummy_data(dummy){
        this.items.push(dummy)
        this.update_list()
    }
    hapus_barang(index){
        const label = (this.tipe === "nemu") ? "Kamu ingin mengambil barang ini? silahkan hubungi penemu" : "Apakah kamu ingin menemukan barang ini?, jika ya silahkan hubungi yang kehilangan"
        const konfrimasi = confirm(label)
        
        alert(`Silahkan hubungi ${this.items[index].contact_person}, data akan dihapus dari list`)
        this.items.splice(index, 1)
        this.update_list()
    }

    update_list(){
        this.container.innerHTML = `<p class = "font_list_head">${this.judul_list}</p>`

        this.items.forEach((value, index) => {
            const new_div = document.createElement("div")
            new_div.id = `barang_${index}_${this.tipe}`
            new_div.className = `barang barang${index} ${this.tipe}`

            const label_waktu = (this.tipe === "nemu") ? "Waktu Menemukan" : "Waktu Kehilangan"
            const label_tempat = (this.tipe === "nemu") ? "Tempat Menemukan" : "Tempat Kehilangan"
            const label_contact_person = (this.tipe === "nemu") ? "Contact Person Penemu" : "Contact Person Kehilangan"

            new_div.innerHTML =`
            <p>Nama Barang = ${value.nama}</p>
            <p>Deskripsi Barang = ${value.deskripsi}</p>
            <p>${label_waktu} = ${value.waktu}</p>
            <p>${label_tempat} = ${value.tempat}</p>
            <p>${label_contact_person} = ${value.contact_person}</p>
            `
            console.log(value.tempat)
            console.log(value.waktu)
            new_div.onclick = () =>{
                this.hapus_barang(index)
            }
            this.container.appendChild(new_div)
        })
    }
}

const hilang = new Manajemen_List("hilang", "list_hilang","List Barang Yang Kehilangan", "hilang_barang" )
hilang.dummy_data(new Barang(
        "Macbook Air M4",
        "warna Skyblue",
        "01/07/2026T18:00PM",
        "Koica ITB Jatinangor",
        "IG @nhasbialhaq184"
))

const nemu = new Manajemen_List("nemu", "list_nemu","List Barang Yang Ditemukan", "nemu_barang" )
nemu.dummy_data(new Barang(
        "Macbook Air M4",
        "warna Skyblue",
        "01/07/2026T18:00PM",
        "Koica ITB Jatinangor",
        "IG @nhasbialhaq184"
))
    </script>
</body>
</html>
